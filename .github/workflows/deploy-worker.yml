name: Deploy Worker to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'src/**'
      - 'package.json'
      - 'next.config.ts'

permissions:
  contents: read
  deployments: write

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install
        working-directory: .

      - name: Build frontend (static export)
        run: npx next build
        env:
          NEXT_PUBLIC_API_URL: https://nychiq-api.bm4413212.workers.dev
        working-directory: .

      - name: Deploy Worker to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
